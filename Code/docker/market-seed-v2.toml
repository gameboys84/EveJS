# Docker configuration for the EVE Ref snapshot-based market seeder.

[input]
static_data_dir = "/var/lib/evejs/gameStore/data"

[output]
database_path = "/var/lib/evejs/market/market.sqlite.candidate"

[source]
index_url = "https://data.everef.net/market-orders/index.json"
download_dir = "/var/lib/evejs/downloads/market-v2"
user_agent = "PublicEveJS market-seederv2/0.1"

[import]
order_filter = "market_scope_with_npc"
market_solar_system_ids = [30000142]
npc_order_duration_threshold_days = 90

[build]
sqlite_cache_size_kib = 262144
sqlite_page_size_bytes = 32768
sqlite_worker_threads = 8
insert_batch_rows = 100000
